<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>计件薪资</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <!-- PWA: 主题色 -->
  <meta name="theme-color" content="#1A5276">
  <!-- PWA: 安卓添加到桌面全屏 -->
  <meta name="mobile-web-app-capable" content="yes">
  <!-- PWA: iOS 添加到桌面全屏 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="计件薪资">
  <!-- PWA: Manifest -->
  <link rel="manifest" href="manifest.json">
  <!-- PWA: 桌面图标 -->
  <link rel="icon" type="image/png" sizes="192x192" href="./appicon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./appicon.png">
  <link rel="apple-touch-icon" href="./appicon.png">
  <style>
    :root {
      --primary: #1296db;
      --primary-light: #e8f4fd;
      --danger: #e74c3c;
      --danger-light: #fde8e6;
      --success: #27ae60;
      --text: #222;
      --text-secondary: #888;
      --border: #e8eaed;
      --radius: 10px;
      --radius-sm: 6px;
      --bg: #f5f7fa;
      --card: #fff;
      --shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 16px;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    body { overflow-x: hidden; }
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }
    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 12px 80px;
    }
    .page-title {
      font-size: 1.18rem;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-title .back-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      color: var(--primary);
      cursor: pointer;
      padding: 4px 6px;
      touch-action: manipulation;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      white-space: nowrap;
      user-select: none;
      transition: opacity .15s;
    }
    .btn:active { opacity: .7; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-sm { padding: 6px 13px; font-size: .88rem; border-radius: var(--radius-sm); }
    .btn-xs { padding: 4px 9px; font-size: .8rem; border-radius: var(--radius-sm); }

    .input {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      font-size: 1rem;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .input:focus { border-color: var(--primary); }
    .input-sm { padding: 7px 9px; font-size: .92rem; width: auto; }
    .input-inline { display: inline-block; width: auto; }

    /* ---------- Home Page ---------- */
    .employee-list { list-style: none; }
    .employee-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .employee-item:active { background: #f0f2f5; }
    .employee-name {
      flex: 1;
      font-size: 1.08rem;
      font-weight: 600;
      color: var(--primary);
    }
    .employee-info {
      font-size: .82rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .add-row .input { flex: 1; }
    .home-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ---------- Employee Page ---------- */
    .emp-name-header {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 16px;
    }
    .input-group .input { flex: 1; min-width: 70px; }
    .input-group .input.price-input { max-width: 100px; }
    .input-group .input.qty-input { max-width: 90px; }
    .input-group .btn { flex-shrink: 0; }

    /* ---------- Wage Groups ---------- */
    .wage-group {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .wage-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .wage-price {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
    }
    .wage-price::after { content: ' 元'; font-weight: 400; color: var(--text-secondary); font-size: .85rem; }
    .wage-subtotal {
      font-size: .92rem;
      color: var(--primary);
      font-weight: 600;
    }
    .wage-subtotal::before { content: '小计：'; font-weight: 400; color: var(--text-secondary); }

    /* ---------- Quantity Blocks ---------- */
    .qty-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0 4px;
    }
    .qty-block {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 38px;
      padding: 0 12px;
      background: var(--primary-light);
      border: 1px solid #c8e6f8;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }
    .qty-block:active { background: #d0ebfa; }
    .qty-del {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: var(--danger);
      color: #fff;
      font-size: .7rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .qty-del:active { background: #c0392b; }

    /* ---------- Edit Mode ---------- */
    .qty-edit-input {
      width: 52px;
      height: 34px;
      text-align: center;
      border: 2px solid var(--primary);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      padding: 0 4px;
    }

    /* ---------- Bottom Bar ---------- */
    .bottom-bar {
      position: fixed;
      left: 0; bottom: 0;
      width: 100%;
      max-width: 600px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      box-shadow: 0 -2px 12px rgba(0,0,0,.05);
      z-index: 20;
    }
    .bottom-total {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .bottom-total::before { content: '当前总工资：'; font-weight: 400; color: var(--text); font-size: .92rem; }
    .bottom-actions {
      display: flex;
      gap: 6px;
    }

    /* ---------- Modal ---------- */
    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .modal {
      background: var(--card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px 16px 16px;
      position: relative;
    }
    .modal-title {
      font-size: 1.08rem;
      font-weight: 700;
      margin-bottom: 14px;
      padding-right: 30px;
    }
    .modal-close {
      position: absolute;
      right: 12px; top: 12px;
      background: none;
      border: none;
      font-size: 1.3rem;
      color: #aaa;
      cursor: pointer;
      touch-action: manipulation;
      padding: 4px 8px;
    }

    /* ---------- History ---------- */
    .history-item {
      background: #f8f9fb;
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .history-date {
      font-size: .85rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .history-total {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.02rem;
      margin-bottom: 8px;
    }
    .history-detail {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.7;
    }
    .history-detail .line { padding: 2px 0; }
    .history-restore {
      margin-top: 8px;
    }

    /* ---------- Export Page (Mobile) ---------- */
    .export-page {
      background: #fff;
      padding: 20px 16px 30px;
      min-height: 100vh;
    }
    .export-title {
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }
    .export-time {
      text-align: center;
      color: var(--text-secondary);
      font-size: .85rem;
      margin-bottom: 18px;
    }
    .export-section {
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
    }
    .export-emp-name {
      font-size: 1.12rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .export-row {
      display: grid;
      grid-template-columns: 60px 1fr 70px;
      gap: 6px;
      padding: 6px 0;
      font-size: .95rem;
      border-bottom: 1px solid #f0f2f5;
    }
    .export-row.header {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: .82rem;
      border-bottom: 1.5px solid var(--border);
    }
    .export-row .col { text-align: right; }
    .export-row .col:first-child { text-align: left; }
    .export-total {
      margin-top: 12px;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--primary);
      padding: 12px;
      background: var(--primary-light);
      border-radius: var(--radius);
    }
    .export-grand-total {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--danger);
      padding: 16px;
      background: #fff3f0;
      border-radius: var(--radius);
      margin-top: 14px;
    }

    /* ---------- Empty State ---------- */
    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
      font-size: 1rem;
    }

    /* ---------- Responsive ---------- */
    @media (min-width: 600px) {
      #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* ======================== Data ======================== */
const STORAGE_KEY = 'piecewage_v3';

function loadData() {
  try {
    var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return Array.isArray(d) ? d : [];
  } catch(e) { return []; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(employeeList));
}

let employeeList = loadData();

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function sum(arr) {
  var s = 0;
  for (var i = 0; i < arr.length; i++) s += arr[i];
  return s;
}

function fmt(v) {
  return Number(v).toFixed(2);
}

function nowStr() {
  var d = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function calcGroupTotal(g) {
  return sum(g.quantities) * g.price;
}

function calcTotal(groups) {
  var t = 0;
  for (var i = 0; i < groups.length; i++) t += calcGroupTotal(groups[i]);
  return fmt(t);
}

function isMobile() {
  return window.innerWidth < 768;
}

function safeName(name) {
  return String(name || '员工').replace(/[/\\?%*:|"<>]/g, '_').trim() || '员工';
}

/* ======================== DOM Helpers ======================== */
var $app = document.getElementById('app');

function clearApp() { $app.innerHTML = ''; }

function qs(sel, ctx) { return (ctx || $app).querySelector(sel); }

/* ======================== Render ======================== */

/* ---------- Home Page ---------- */
function removeBottomBar() {
  var old = document.getElementById('emp-bottom');
  if (old) old.parentNode.removeChild(old);
}

function renderHome() {
  clearApp();
  removeBottomBar();
  var page = ce('div', 'page');
  page.innerHTML = '<div class="page-title">员工列表</div>';

  // Add row
  var addRow = ce('div', 'add-row');
  var addInp = ce('input', 'input');
  addInp.type = 'text';
  addInp.placeholder = '输入姓名';
  addInp.id = 'add-name-input';
  addInp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      addBtn.click();
    }
  });
  addRow.appendChild(addInp);

  var addBtn = ce('button', 'btn btn-primary');
  addBtn.textContent = '添加';
  addBtn.onclick = function() {
    var name = addInp.value.trim();
    if (!name) return;
    employeeList.push({ id: genId(), name: name, wageGroups: [], history: [] });
    saveData();
    renderHome();
  };
  addRow.appendChild(addBtn);
  page.appendChild(addRow);

  // List
  if (employeeList.length === 0) {
    var emptyEl = ce('div', 'empty-state');
    emptyEl.textContent = '暂无员工，输入姓名后点击「添加」';
    page.appendChild(emptyEl);
  } else {
    var ul = ce('ul', 'employee-list');
    employeeList.forEach(function(emp, idx) {
      var li = ce('li', 'employee-item');
      var infoDiv = ce('div');
      infoDiv.style.flex = '1';
      var nameSpan = ce('div', 'employee-name');
      nameSpan.textContent = emp.name;
      infoDiv.appendChild(nameSpan);

      var totalWage = calcTotal(emp.wageGroups);
      if (emp.wageGroups.length > 0) {
        var info = ce('div', 'employee-info');
        info.textContent = '当前总工资：￥' + totalWage;
        infoDiv.appendChild(info);
      }

      li.appendChild(infoDiv);

      var delBtn = ce('button', 'btn btn-danger btn-xs');
      delBtn.textContent = '删除';
      delBtn.onclick = function(e) {
        e.stopPropagation();
        if (confirm('确认删除【' + emp.name + '】？不可恢复。')) {
          employeeList.splice(idx, 1);
          saveData();
          renderHome();
        }
      };
      li.appendChild(delBtn);

      li.onclick = function() { renderEmployee(emp); };
      ul.appendChild(li);
    });
    page.appendChild(ul);
  }

  // Bottom actions
  var actions = ce('div', 'home-actions');
  var exportBtn = ce('button', 'btn btn-outline');
  exportBtn.textContent = '导出所有人工资';
  exportBtn.onclick = function() {
    if (isMobile()) renderMobileExportAll();
    else exportExcelAll();
  };
  actions.appendChild(exportBtn);
  page.appendChild(actions);

  $app.appendChild(page);
}

/* ---------- Employee Wage Page ---------- */
function renderEmployee(emp) {
  clearApp();
  var page = ce('div', 'page');

  // Header with back
  var title = ce('div', 'page-title');
  var back = ce('button', 'back-btn');
  back.textContent = '\u2190';
  back.onclick = renderHome;
  title.appendChild(back);
  var nameSpan = ce('span');
  nameSpan.textContent = emp.name;
  title.appendChild(nameSpan);
  page.appendChild(title);

  // Input group
  var inputGroup = ce('div', 'input-group');
  var priceInp = ce('input', 'input price-input');
  priceInp.type = 'text';
  priceInp.inputMode = 'decimal';
  priceInp.placeholder = '单价';
  priceInp.autocomplete = 'off';
  inputGroup.appendChild(priceInp);

  var qtyInp = ce('input', 'input qty-input');
  qtyInp.type = 'tel';
  qtyInp.inputMode = 'numeric';
  qtyInp.placeholder = '数量';
  qtyInp.autocomplete = 'off';
  inputGroup.appendChild(qtyInp);

  function doSave() {
    var p = Number(String(priceInp.value).replace(/,/g, '').trim());
    var q = Number(qtyInp.value.trim());
    if (!(p > 0) || !(q > 0)) return;

    // Find existing group with same price
    var found = null;
    for (var i = 0; i < emp.wageGroups.length; i++) {
      if (emp.wageGroups[i].price === p) { found = emp.wageGroups[i]; break; }
    }
    if (found) {
      found.quantities.push(q);
    } else {
      emp.wageGroups.push({ id: genId(), price: p, quantities: [q] });
    }
    saveData();
    qtyInp.value = '';
    qtyInp.focus();
    renderWageGroups(emp, page);
    updateEmployeeBottom(emp);
  }

  qtyInp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && qtyInp.value.trim()) {
      e.preventDefault();
      doSave();
    }
  });

  var saveBtn = ce('button', 'btn btn-primary');
  saveBtn.textContent = '保存';
  saveBtn.onclick = doSave;
  inputGroup.appendChild(saveBtn);
  page.appendChild(inputGroup);

  // Wage groups area
  var groupsArea = ce('div');
  groupsArea.id = 'groups-area';
  page.appendChild(groupsArea);

  $app.appendChild(page);

  // 修复: 在 DOM 插入后再渲染，确保 document.getElementById 能找到元素
  renderWageGroups(emp, page);
  updateEmployeeBottom(emp);
}

function renderWageGroups(emp, page) {
  var area = document.getElementById('groups-area');
  if (!area) return;
  area.innerHTML = '';

  if (emp.wageGroups.length === 0) {
    area.innerHTML = '<div class="empty-state">暂无工资记录，输入单价和数量后点击「保存」</div>';
    return;
  }

  emp.wageGroups.forEach(function(g, gIdx) {
    var box = ce('div', 'wage-group');

    // Header
    var header = ce('div', 'wage-group-header');
    var priceSpan = ce('span', 'wage-price');
    priceSpan.textContent = g.price;
    header.appendChild(priceSpan);

    var subSpan = ce('span', 'wage-subtotal');
    subSpan.textContent = fmt(calcGroupTotal(g));
    header.appendChild(subSpan);
    box.appendChild(header);

    // Quantity blocks
    var qtyList = ce('div', 'qty-list');
    g.quantities.forEach(function(q, qIdx) {
      var block = ce('div', 'qty-block');
      block.textContent = q;

      // Delete button
      var del = ce('button', 'qty-del');
      del.textContent = '\u00D7';
      del.onclick = function(e) {
        e.stopPropagation();
        g.quantities.splice(qIdx, 1);
        saveData();
        renderWageGroups(emp, page);
        updateEmployeeBottom(emp);
      };
      block.appendChild(del);

      // Click to edit
      block.onclick = function() {
        startQtyEdit(block, emp, g, qIdx, page);
      };

      qtyList.appendChild(block);
    });
    box.appendChild(qtyList);

    area.appendChild(box);
  });
}

function startQtyEdit(block, emp, g, qIdx, page) {
  block.style.display = 'none';
  var input = ce('input', 'qty-edit-input');
  input.type = 'number';
  input.min = '1';
  input.value = g.quantities[qIdx];
  input.inputMode = 'numeric';

  function finish() {
    var val = Number(input.value);
    if (val > 0 && val !== g.quantities[qIdx]) {
      g.quantities[qIdx] = val;
      saveData();
      renderWageGroups(emp, page);
      updateEmployeeBottom(emp);
    } else {
      block.style.display = '';
      if (input.parentNode) input.parentNode.removeChild(input);
    }
  }

  input.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); finish(); }
    if (e.key === 'Escape') { block.style.display = ''; if (input.parentNode) input.parentNode.removeChild(input); }
  };
  input.onblur = finish;

  block.parentNode.insertBefore(input, block.nextSibling);
  setTimeout(function() { input.focus(); input.select(); }, 50);
}

function updateEmployeeBottom(emp) {
  var old = document.getElementById('emp-bottom');
  if (old) old.parentNode.removeChild(old);

  var bar = ce('div', 'bottom-bar');
  bar.id = 'emp-bottom';

  var total = ce('span', 'bottom-total');
  total.textContent = '\uFFE5' + calcTotal(emp.wageGroups);
  bar.appendChild(total);

  var actions = ce('div', 'bottom-actions');

  var historyBtn = ce('button', 'btn btn-outline btn-sm');
  historyBtn.textContent = '历史';
  historyBtn.onclick = function() { showHistory(emp); };
  actions.appendChild(historyBtn);

  var exportBtn = ce('button', 'btn btn-outline btn-sm');
  exportBtn.textContent = '导出';
  exportBtn.onclick = function() {
    if (isMobile()) renderMobileExportSingle(emp);
    else exportExcelSingle(emp);
  };
  actions.appendChild(exportBtn);

  var archiveBtn = ce('button', 'btn btn-primary btn-sm');
  archiveBtn.textContent = '归档';
  archiveBtn.onclick = function() { doArchive(emp); };
  actions.appendChild(archiveBtn);

  bar.appendChild(actions);
  document.body.appendChild(bar);
}

/* ---------- Archive ---------- */
function doArchive(emp) {
  if (emp.wageGroups.length === 0) { alert('没有工资数据可归档'); return; }
  if (!confirm('确认归档？\n当前工资将保存到历史记录并清空本月数据。')) return;

  var snap = emp.wageGroups.map(function(g) {
    return { id: g.id, price: g.price, quantities: g.quantities.slice() };
  });
  emp.history.push({
    id: genId(),
    date: nowStr(),
    groups: snap
  });
  emp.wageGroups = [];
  saveData();
  renderEmployee(emp);
}

/* ---------- History ---------- */
function showHistory(emp) {
  var mask = ce('div', 'modal-mask');
  var modal = ce('div', 'modal');

  var title = ce('div', 'modal-title');
  title.textContent = emp.name + ' - 历史记录';
  modal.appendChild(title);

  var closeBtn = ce('button', 'modal-close');
  closeBtn.textContent = '\u00D7';
  closeBtn.onclick = function() { document.body.removeChild(mask); };
  modal.appendChild(closeBtn);

  if (!emp.history || emp.history.length === 0) {
    modal.innerHTML += '<div style="color:#aaa;padding:20px 0;text-align:center;">暂无历史记录</div>';
  } else {
    // Show newest first
    for (var i = emp.history.length - 1; i >= 0; i--) {
      var h = emp.history[i];
      var item = ce('div', 'history-item');

      var dateDiv = ce('div', 'history-date');
      dateDiv.textContent = h.date;
      item.appendChild(dateDiv);

      var totalDiv = ce('div', 'history-total');
      totalDiv.textContent = '\uFFE5' + calcTotal(h.groups);
      item.appendChild(totalDiv);

      var detail = ce('div', 'history-detail');
      h.groups.forEach(function(g) {
        var line = ce('div', 'line');
        var qStr = g.quantities.join(' + ');
        line.textContent = g.price + '元：' + qStr + '  小计：\uFFE5' + fmt(calcGroupTotal(g));
        detail.appendChild(line);
      });
      item.appendChild(detail);

      var restoreBtn = ce('button', 'btn btn-outline btn-xs history-restore');
      restoreBtn.textContent = '恢复归档';
      restoreBtn.onclick = function() {
        if (!confirm('恢复后将替换当前工资数据，确定？')) return;

        // Remove archive from history and restore groups
        var idx = emp.history.indexOf(h);
        if (idx !== -1) {
          emp.history.splice(idx, 1);
          emp.wageGroups = h.groups.map(function(g) {
            return { id: genId(), price: g.price, quantities: g.quantities.slice() };
          });
          saveData();
          document.body.removeChild(mask);
          renderEmployee(emp);
        }
      };
      item.appendChild(restoreBtn);

      modal.appendChild(item);
    }
  }

  mask.appendChild(modal);
  document.body.appendChild(mask);
  mask.onclick = function(e) { if (e.target === mask) document.body.removeChild(mask); };
}

/* ======================== Export ======================== */

/* ---------- 手机端导出（同一单价合并显示） ---------- */
function renderMobileExportSingle(emp) {
  renderMobileExport([emp], emp.name + ' - 工资明细');
}

function renderMobileExportAll() {
  renderMobileExport(employeeList, '全部员工工资明细');
}

function renderMobileExport(emps, titleText) {
  clearApp();
  var page = ce('div', 'export-page');

  var title = ce('div', 'export-title');
  title.textContent = titleText;
  page.appendChild(title);

  var timeDiv = ce('div', 'export-time');
  timeDiv.textContent = '导出时间：' + nowStr();
  page.appendChild(timeDiv);

  var grandTotal = 0;

  emps.forEach(function(emp) {
    var sec = ce('div', 'export-section');

    var nameDiv = ce('div', 'export-emp-name');
    nameDiv.textContent = emp.name;
    sec.appendChild(nameDiv);

    // Header row
    var header = ce('div', 'export-row header');
    header.innerHTML = '<div class="col">单价</div><div class="col">数量</div><div class="col">小计</div>';
    sec.appendChild(header);

    var empTotal = 0;
    var groups = emp.wageGroups || [];
    if (groups.length === 0) {
      var emptyHint = ce('div');
      emptyHint.style.cssText = 'color:#aaa;padding:8px 0;font-size:.88rem;';
      emptyHint.textContent = '暂无数据';
      sec.appendChild(emptyHint);
    } else {
      groups.forEach(function(g) {
        var row = ce('div', 'export-row');
        var qStr = g.quantities.join(' + ');
        var sub = calcGroupTotal(g);
        empTotal += sub;
        row.innerHTML = '<div class="col">' + g.price + '</div><div class="col" style="text-align:center;">' + qStr + '</div><div class="col">\uFFE5' + fmt(sub) + '</div>';
        sec.appendChild(row);
      });
    }

    var empTotalDiv = ce('div', 'export-total');
    empTotalDiv.textContent = emp.name + ' 本月总工资：\uFFE5' + fmt(empTotal);
    sec.appendChild(empTotalDiv);

    page.appendChild(sec);
    grandTotal += empTotal;
  });

  // 改进: 全员导出时始终显示总工资
  var gtDiv = ce('div', emps.length > 1 ? 'export-grand-total' : 'export-total');
  if (emps.length > 1) {
    gtDiv.textContent = '全体员工总工资：\uFFE5' + fmt(grandTotal);
  }
  page.appendChild(gtDiv);

  // Close button
  var closeBtn = ce('button', 'btn btn-outline');
  closeBtn.textContent = '返回';
  closeBtn.style.display = 'block';
  closeBtn.style.margin = '20px auto 0';
  closeBtn.onclick = function() {
    if (emps.length === 1 && emps[0]) renderEmployee(emps[0]);
    else renderHome();
  };
  page.appendChild(closeBtn);

  $app.appendChild(page);
}

/* ---------- Excel 导出（同一单价合并显示 + 累计小计） ---------- */

function buildExportAoa(emps) {
  var headers = ['导出时间', '员工姓名', '单价', '数量', '小计'];
  var rows = [];
  var exportTime = nowStr();
  var allTotal = 0;

  emps.forEach(function(emp) {
    var groups = emp.wageGroups || [];
    if (groups.length === 0) {
      rows.push([exportTime, emp.name, '', '', 0]);
      rows.push([exportTime, emp.name + ' 小计', '', '', 0]);
      rows.push([]);
      return;
    }
    var empTotal = 0;
    groups.forEach(function(g) {
      var qStr = g.quantities.join(' + ');
      var sub = calcGroupTotal(g);
      empTotal += sub;
      rows.push([exportTime, emp.name, g.price, qStr, sub]);
    });
    // Total row for this employee
    rows.push([exportTime, emp.name + ' 小计', '', '', Math.round(empTotal * 100) / 100]);
    rows.push([]);
    allTotal += empTotal;
  });

  // Grand total
  rows.push(['', '全体员工总工资', '', '', Math.round(allTotal * 100) / 100]);

  return { aoa: [headers].concat(rows), headerRows: [0], totalRow: rows.length - 1 };
}

function downloadExcel(spec, filename) {
  if (typeof XLSX === 'undefined') { alert('Excel 组件未加载，请刷新重试。'); return; }
  var ws = XLSX.utils.aoa_to_sheet(spec.aoa);
  // Set column widths
  ws['!cols'] = [
    { wch: 18 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 12 }
  ];
  // Freeze header
  ws['!views'] = [{ state: 'frozen', ySplit: 1 }];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '工资');
  XLSX.writeFile(wb, filename, { compression: true });
}

function exportExcelSingle(emp) {
  var spec = buildExportAoa([emp]);
  downloadExcel(spec, safeName(emp.name) + '-工资.xlsx');
}

function exportExcelAll() {
  if (employeeList.length === 0) { alert('暂无员工数据'); return; }
  var spec = buildExportAoa(employeeList);
  downloadExcel(spec, '全部员工工资.xlsx');
}

/* ======================== Utility ======================== */
function ce(tag, className) {
  var el = document.createElement(tag);
  if (className) el.className = className;
  return el;
}

/* ======================== Init ======================== */
renderHome();

/* ======== 注册 Service Worker (PWA 离线支持) ======== */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
