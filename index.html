<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>计件薪资</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#1A5276">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="计件薪资">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./appicon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./appicon.png">
  <link rel="apple-touch-icon" href="./appicon.png">
  <style>
    :root {
      --primary: #1296db;
      --primary-light: #e8f4fd;
      --danger: #e74c3c;
      --danger-light: #fde8e6;
      --success: #27ae60;
      --warning: #f39c12;
      --text: #222;
      --text-secondary: #888;
      --border: #e8eaed;
      --radius: 10px;
      --radius-sm: 6px;
      --bg: #f5f7fa;
      --card: #fff;
      --shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 16px;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    body { overflow-x: hidden; }
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }
    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 12px 80px;
    }
    .page-title {
      font-size: 1.18rem;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-title .back-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      color: var(--primary);
      cursor: pointer;
      padding: 4px 6px;
      touch-action: manipulation;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      white-space: nowrap;
      user-select: none;
      transition: opacity .15s;
    }
    .btn:active { opacity: .7; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-warning { background: var(--warning); color: #fff; }
    .btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-outline-danger { background: #fff; color: var(--danger); border: 1.5px solid var(--danger); }
    .btn-sm { padding: 6px 13px; font-size: .88rem; border-radius: var(--radius-sm); }
    .btn-xs { padding: 4px 9px; font-size: .8rem; border-radius: var(--radius-sm); }
    .btn-block { width: 100%; }

    .input {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      font-size: 1rem;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .input:focus { border-color: var(--primary); }
    .input-sm { padding: 7px 9px; font-size: .92rem; width: auto; }
    .input-inline { display: inline-block; width: auto; }

    /* ---------- Checkbox ---------- */
    .chk-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .chk-wrap input[type="checkbox"] {
      width: 20px; height: 20px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }
    .select-all-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    .select-all-bar .chk-wrap { flex: 1; }

    /* ---------- Home Page ---------- */
    .employee-list { list-style: none; }
    .employee-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .employee-item:active { background: #f0f2f5; }
    .employee-item .chk-wrap { margin-right: 4px; }
    .employee-name {
      flex: 1;
      font-size: 1.08rem;
      font-weight: 600;
      color: var(--primary);
    }
    .employee-info {
      font-size: .82rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .add-row .input { flex: 1; }
    .home-actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .home-actions .btn { flex: 1; min-width: calc(50% - 4px); }

    /* ---------- Employee Page ---------- */
    .emp-name-header {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 16px;
    }
    .input-group .input { flex: 1; min-width: 70px; }
    .input-group .input.price-input { max-width: 110px; }
    .input-group .input.qty-input { max-width: 100px; }
    .input-group .btn { flex-shrink: 0; }

    /* ---------- Wage Groups ---------- */
    .wage-group {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .wage-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .wage-price {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
    }
    .wage-price::after { content: ' 元'; font-weight: 400; color: var(--text-secondary); font-size: .85rem; }
    .wage-subtotal {
      font-size: .92rem;
      color: var(--primary);
      font-weight: 600;
    }
    .wage-subtotal::before { content: '小计：'; font-weight: 400; color: var(--text-secondary); }

    /* ---------- Quantity Blocks ---------- */
    .qty-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0 4px;
    }
    .qty-block {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 38px;
      padding: 0 12px;
      background: var(--primary-light);
      border: 1px solid #c8e6f8;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }
    .qty-block:active { background: #d0ebfa; }
    .qty-del {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: var(--danger);
      color: #fff;
      font-size: .7rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .qty-del:active { background: #c0392b; }

    /* ---------- Edit Mode ---------- */
    .qty-edit-input {
      width: 52px;
      height: 34px;
      text-align: center;
      border: 2px solid var(--primary);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      padding: 0 4px;
    }

    /* ---------- Bottom Bar ---------- */
    .bottom-bar {
      position: fixed;
      left: 0; bottom: 0;
      width: 100%;
      max-width: 600px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      box-shadow: 0 -2px 12px rgba(0,0,0,.05);
      z-index: 20;
    }
    .bottom-total {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .bottom-total::before { content: '当前总工资：'; font-weight: 400; color: var(--text); font-size: .92rem; }
    .bottom-actions {
      display: flex;
      gap: 6px;
    }

    /* ---------- Modal ---------- */
    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .modal {
      background: var(--card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px 16px 16px;
      position: relative;
    }
    .modal-title {
      font-size: 1.08rem;
      font-weight: 700;
      margin-bottom: 14px;
      padding-right: 30px;
    }
    .modal-close {
      position: absolute;
      right: 12px; top: 12px;
      background: none;
      border: none;
      font-size: 1.3rem;
      color: #aaa;
      cursor: pointer;
      touch-action: manipulation;
      padding: 4px 8px;
    }

    /* ---------- History Page ---------- */
    .history-month-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
    }
    .history-month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .history-month-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .history-month-total {
      font-size: .95rem;
      font-weight: 600;
      color: var(--danger);
    }
    .history-emp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f2f5;
      cursor: pointer;
      touch-action: manipulation;
    }
    .history-emp-row:last-child { border-bottom: none; }
    .history-emp-row:active { background: #f8f9fb; }
    .history-emp-name {
      flex: 1;
      font-weight: 600;
      color: var(--primary);
    }
    .history-emp-wage {
      font-weight: 600;
      color: var(--text);
    }
    .history-month-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    /* ---------- History Detail Modal ---------- */
    .hist-detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr 70px;
      gap: 6px;
      padding: 6px 0;
      font-size: .92rem;
      border-bottom: 1px solid #f0f2f5;
    }
    .hist-detail-row.header {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: .82rem;
    }
    .hist-detail-row .col { text-align: right; }
    .hist-detail-row .col:first-child { text-align: left; }

    /* ---------- Export Page (Mobile) ---------- */
    .export-page {
      background: #fff;
      padding: 20px 16px 30px;
      min-height: 100vh;
    }
    .export-title {
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }
    .export-time {
      text-align: center;
      color: var(--text-secondary);
      font-size: .85rem;
      margin-bottom: 18px;
    }
    .export-section {
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
    }
    .export-emp-name {
      font-size: 1.12rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .export-row {
      display: grid;
      grid-template-columns: 60px 1fr 70px;
      gap: 6px;
      padding: 6px 0;
      font-size: .95rem;
      border-bottom: 1px solid #f0f2f5;
    }
    .export-row.header {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: .82rem;
    }
    .export-row .col { text-align: right; }
    .export-row .col:first-child { text-align: left; }
    .export-total {
      margin-top: 12px;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--primary);
      padding: 12px;
      background: var(--primary-light);
      border-radius: var(--radius);
    }
    .export-grand-total {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--danger);
      padding: 16px;
      background: #fff3f0;
      border-radius: var(--radius);
      margin-top: 14px;
    }

    /* ---------- Empty State ---------- */
    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
      font-size: 1rem;
    }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(0,0,0,.78);
      color: #fff;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 1rem;
      z-index: 999;
      pointer-events: none;
      animation: toastIn .25s ease;
    }
    @keyframes toastIn { from { opacity:0; transform:translate(-50%,-50%) scale(.9); } to { opacity:1; transform:translate(-50%,-50%) scale(1); } }

    /* ---------- Responsive ---------- */
    @media (min-width: 600px) {
      #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- CloudBase SDK removed -->
<script>
/* ======================== Data ======================== */
const STORAGE_KEY = 'piecewage_v4';
const ARCHIVE_KEY = 'piecewage_archives_v1';

function loadData() {
  try {
    var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return Array.isArray(d) ? d : [];
  } catch(e) { return []; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(employeeList));
}

function loadArchives() {
  try {
    var d = JSON.parse(localStorage.getItem(ARCHIVE_KEY));
    return Array.isArray(d) ? d : [];
  } catch(e) { return []; }
}

function saveArchives() {
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archives));
}

let employeeList = loadData();
let archives = loadArchives();

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function sum(arr) {
  var s = 0;
  for (var i = 0; i < arr.length; i++) s += arr[i];
  return s;
}

function fmt(v) {
  return Number(v).toFixed(2);
}

function nowStr() {
  var d = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function currentMonth() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2, '0');
}

function calcGroupTotal(g) {
  return sum(g.quantities) * g.price;
}

function calcTotal(groups) {
  var t = 0;
  for (var i = 0; i < groups.length; i++) t += calcGroupTotal(groups[i]);
  return t;
}

function calcTotalFmt(groups) {
  return fmt(calcTotal(groups));
}

function isMobile() {
  return window.innerWidth < 768;
}

function safeName(name) {
  return String(name || '员工').replace(/[/\\?%*:|"<>]/g, '_').trim() || '员工';
}

/* ======================== Toast ======================== */

/* ======================== Toast ======================== */
function showToast(msg, duration) {
  duration = duration || 1800;
  var old = document.querySelector('.toast');
  if (old) old.parentNode.removeChild(old);
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, duration);
}

/* ======================== DOM Helpers ======================== */
var $app = document.getElementById('app');

function clearApp() { $app.innerHTML = ''; }

function qs(sel, ctx) { return (ctx || $app).querySelector(sel); }

function ce(tag, className) {
  var el = document.createElement(tag);
  if (className) el.className = className;
  return el;
}

/* ======================== Navigation ======================== */
function removeBottomBar() {
  var old = document.getElementById('emp-bottom');
  if (old) old.parentNode.removeChild(old);
}

function getSelectedEmpIds() {
  var checked = document.querySelectorAll('.emp-chk:checked');
  var ids = [];
  for (var i = 0; i < checked.length; i++) ids.push(checked[i].value);
  return ids;
}

function getEmpsByIds(ids) {
  return employeeList.filter(function(e) { return ids.indexOf(e.id) !== -1; });
}

/* ======================== Render: Home (Cover) ======================== */
function renderHome() {
  clearApp();
  removeBottomBar();
  var page = ce('div', 'page');
  page.innerHTML = '<div class="page-title">📋 员工列表 <span style="font-size:.75rem;color:var(--text-secondary);font-weight:400;margin-left:auto">' + currentMonth() + '</span></div>';

  var addRow = ce('div', 'add-row');
  var addInp = ce('input', 'input');
  addInp.type = 'text';
  addInp.placeholder = '输入姓名';
  addInp.id = 'add-name-input';
  addInp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
  });
  addRow.appendChild(addInp);
  var addBtn = ce('button', 'btn btn-primary');
  addBtn.textContent = '添加';
  addBtn.onclick = function() {
    var name = addInp.value.trim();
    if (!name) return;
    var emp = { id: genId(), name: name, wageGroups: [] };
    employeeList.push(emp);
    saveData();
    renderHome();
  };
  addRow.appendChild(addBtn);
  page.appendChild(addRow);

  if (employeeList.length === 0) {
    var emptyEl = ce('div', 'empty-state');
    emptyEl.textContent = '暂无员工，输入姓名后点击「添加」';
    page.appendChild(emptyEl);
  } else {
    // Select all bar
    var selBar = ce('div', 'select-all-bar');
    var allChkWrap = ce('label', 'chk-wrap');
    var allChk = document.createElement('input');
    allChk.type = 'checkbox';
    allChk.id = 'select-all-emp';
    allChk.onchange = function() {
      var chks = document.querySelectorAll('.emp-chk');
      for (var i = 0; i < chks.length; i++) chks[i].checked = allChk.checked;
      updateSelectedCount();
    };
    allChkWrap.appendChild(allChk);
    allChkWrap.appendChild(document.createTextNode('全选'));
    selBar.appendChild(allChkWrap);

    var selectedCount = ce('span');
    selectedCount.id = 'selected-count';
    selectedCount.style.cssText = 'font-size:.82rem;color:var(--text-secondary);';
    selectedCount.textContent = '已选 0 人';
    selBar.appendChild(selectedCount);
    page.appendChild(selBar);

    // List
    var ul = ce('ul', 'employee-list');
    employeeList.forEach(function(emp, idx) {
      var li = ce('li', 'employee-item');
      var chkWrap = ce('label', 'chk-wrap');
      var chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.className = 'emp-chk';
      chk.value = emp.id;
      chk.onchange = function() {
        updateSelectedCount();
        var allCk = document.getElementById('select-all-emp');
        if (allCk) {
          var allChecked = true;
          var chks = document.querySelectorAll('.emp-chk');
          for (var i = 0; i < chks.length; i++) { if (!chks[i].checked) { allChecked = false; break; } }
          allCk.checked = allChecked;
        }
      };
      chkWrap.appendChild(chk);
      li.appendChild(chkWrap);

      var infoDiv = ce('div');
      infoDiv.style.flex = '1';
      var nameSpan = ce('div', 'employee-name');
      nameSpan.textContent = emp.name;
      infoDiv.appendChild(nameSpan);

      if (emp.wageGroups.length > 0) {
        var info = ce('div', 'employee-info');
        info.textContent = '当前总工资：￥' + calcTotalFmt(emp.wageGroups);
        infoDiv.appendChild(info);
      }
      li.appendChild(infoDiv);

      var delBtn = ce('button', 'btn btn-danger btn-xs');
      delBtn.textContent = '删除';
      delBtn.onclick = function(e) {
        e.stopPropagation();
        if (confirm('确认删除【' + emp.name + '】？不可恢复。')) {
          employeeList.splice(idx, 1);
          saveData();
          renderHome();
        }
      };
      li.appendChild(delBtn);

      li.onclick = function(e) {
        if (e.target.tagName === 'INPUT') return;
        renderEmployee(emp);
      };
      ul.appendChild(li);
    });
    page.appendChild(ul);

    // Actions
    var actions = ce('div', 'home-actions');
    var archiveBtn = ce('button', 'btn btn-warning');
    archiveBtn.textContent = '📦 归档';
    archiveBtn.onclick = function() { doArchiveSelected(); };
    actions.appendChild(archiveBtn);

    var exportBtn = ce('button', 'btn btn-primary');
    exportBtn.textContent = '📤 导出';
    exportBtn.onclick = function() { doExportSelected(); };
    actions.appendChild(exportBtn);

    var historyBtn = ce('button', 'btn btn-outline');
    historyBtn.textContent = '📜 历史';

/* ======================== Render: Employee Page ======================== */
function renderEmployee(emp) {
  clearApp();
  var page = ce('div', 'page');

  var title = ce('div', 'page-title');
  var back = ce('button', 'back-btn');
  back.textContent = '\u2190';
  back.onclick = renderHome;
  title.appendChild(back);
  var nameSpan = ce('span');
  nameSpan.textContent = emp.name;
  title.appendChild(nameSpan);
  page.appendChild(title);

  var inputGroup = ce('div', 'input-group');
  var priceInp = ce('input', 'input price-input');
  priceInp.type = 'text';
  priceInp.inputMode = 'decimal';
  priceInp.placeholder = '单价';
  priceInp.autocomplete = 'off';
  inputGroup.appendChild(priceInp);

  var qtyInp = ce('input', 'input qty-input');
  qtyInp.type = 'tel';
  qtyInp.inputMode = 'numeric';
  qtyInp.placeholder = '数量';
  qtyInp.autocomplete = 'off';
  inputGroup.appendChild(qtyInp);

  function doSave() {
    var p = Number(String(priceInp.value).replace(/,/g, '').trim());
    var q = Number(qtyInp.value.trim());
    if (!(p > 0) || !(q > 0)) return;

    var found = null;
    for (var i = 0; i < emp.wageGroups.length; i++) {
      if (emp.wageGroups[i].price === p) { found = emp.wageGroups[i]; break; }
    }
    if (found) {
      found.quantities.push(q);
    } else {
      var ng = { id: genId(), price: p, quantities: [q] };
      emp.wageGroups.push(ng);
    }
    saveData();
    qtyInp.value = '';
    qtyInp.focus();
    renderWageGroups(emp, page);
    updateEmployeeBottom(emp);
    showToast('已保存：' + p + '元 × ' + q);
  }

  qtyInp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && qtyInp.value.trim()) { e.preventDefault(); doSave(); }
  });

  var saveBtn = ce('button', 'btn btn-primary');
  saveBtn.textContent = '保存';
  saveBtn.onclick = doSave;
  inputGroup.appendChild(saveBtn);
  page.appendChild(inputGroup);

  var groupsArea = ce('div');
  groupsArea.id = 'groups-area';
  page.appendChild(groupsArea);

  $app.appendChild(page);
  renderWageGroups(emp, page);
  updateEmployeeBottom(emp);
}

function renderWageGroups(emp, page) {
  var area = document.getElementById('groups-area');
  if (!area) return;
  area.innerHTML = '';

  if (emp.wageGroups.length === 0) {
    area.innerHTML = '<div class="empty-state">暂无工资记录，输入单价和数量后点击「保存」</div>';
    return;
  }

  emp.wageGroups.forEach(function(g, gIdx) {
    var box = ce('div', 'wage-group');
    var header = ce('div', 'wage-group-header');
    var priceSpan = ce('span', 'wage-price');
    priceSpan.textContent = g.price;
    header.appendChild(priceSpan);
    var subSpan = ce('span', 'wage-subtotal');
    subSpan.textContent = fmt(calcGroupTotal(g));
    header.appendChild(subSpan);
    box.appendChild(header);

    var qtyList = ce('div', 'qty-list');
    g.quantities.forEach(function(q, qIdx) {
      var block = ce('div', 'qty-block');
      block.textContent = q;
      var del = ce('button', 'qty-del');
      del.textContent = '\u00D7';
      del.onclick = function(e) {
        e.stopPropagation();
        g.quantities.splice(qIdx, 1);
        saveData();
        renderWageGroups(emp, page);
        updateEmployeeBottom(emp);
      };
      block.appendChild(del);
      block.onclick = function() { startQtyEdit(block, emp, g, qIdx, page); };
      qtyList.appendChild(block);
    });
    box.appendChild(qtyList);
    area.appendChild(box);
  });
}

function startQtyEdit(block, emp, g, qIdx, page) {
  block.style.display = 'none';
  var input = ce('input', 'qty-edit-input');
  input.type = 'number';
  input.min = '1';
  input.value = g.quantities[qIdx];
  input.inputMode = 'numeric';

  function finish() {
    var val = Number(input.value);
    if (val > 0 && val !== g.quantities[qIdx]) {
      g.quantities[qIdx] = val;
      saveData();
      renderWageGroups(emp, page);
      updateEmployeeBottom(emp);
    } else {
      block.style.display = '';
      if (input.parentNode) input.parentNode.removeChild(input);
    }
  }

  input.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); finish(); }
    if (e.key === 'Escape') { block.style.display = ''; if (input.parentNode) input.parentNode.removeChild(input); }
  };
  input.onblur = finish;
  block.parentNode.insertBefore(input, block.nextSibling);
  setTimeout(function() { input.focus(); input.select(); }, 50);
}

function updateEmployeeBottom(emp) {
  var old = document.getElementById('emp-bottom');
  if (old) old.parentNode.removeChild(old);

  var bar = ce('div', 'bottom-bar');
  bar.id = 'emp-bottom';

  var total = ce('span', 'bottom-total');
  total.textContent = '\uFFE5' + calcTotalFmt(emp.wageGroups);

/* ======================== Archive ======================== */
function doArchiveSelected() {
  var ids = getSelectedEmpIds();
  if (ids.length === 0) { alert('请先选择要归档的员工'); return; }
  var emps = getEmpsByIds(ids);
  if (confirm('确认归档选中的 ' + emps.length + ' 位员工？\n当前工资将保存到历史记录并清空本月数据。')) {
    doArchive(emps);
  }
}

function doArchive(emps) {
  var filtered = emps.filter(function(e) { return e.wageGroups.length > 0; });
  if (filtered.length === 0) { showToast('所选员工暂无工资数据'); return; }

  var snapEmps = filtered.map(function(e) {
    return {
      id: e.id,
      name: e.name,
      groups: e.wageGroups.map(function(g) {
        return { id: g.id, price: g.price, quantities: g.quantities.slice() };
      })
    };
  });

  var month = currentMonth();
  var existing = null;
  for (var i = 0; i < archives.length; i++) {
    if (archives[i].month === month) { existing = archives[i]; break; }
  }

  if (existing) {
    snapEmps.forEach(function(se) {
      var found = false;
      for (var j = 0; j < existing.employees.length; j++) {
        if (existing.employees[j].id === se.id) {
          se.groups.forEach(function(sg) {
            var gFound = false;
            for (var k = 0; k < existing.employees[j].groups.length; k++) {
              if (existing.employees[j].groups[k].price === sg.price) {
                existing.employees[j].groups[k].quantities = existing.employees[j].groups[k].quantities.concat(sg.quantities);
                gFound = true; break;
              }
            }
            if (!gFound) existing.employees[j].groups.push(sg);
          });
          found = true; return;
        }
      }
      if (!found) existing.employees.push(se);
    });
    existing.date = nowStr();
  } else {
    archives.push({
      id: genId(),
      month: month,
      date: nowStr(),
      employees: snapEmps
    });
  }

  filtered.forEach(function(e) { e.wageGroups = []; });
  saveData();
  saveArchives();
  showToast('已归档 ' + filtered.length + ' 位员工');
  renderHome();
}

/* ======================== History: Restore ======================== */
function restoreFromArchive(arch, archIdx) {
  var chks = document.querySelectorAll('.hist-emp-chk:checked');
  var selected = [];
  for (var i = 0; i < chks.length; i++) {
    var parts = chks[i].value.split('|');
    if (parts[0] === arch.id) {
      var empData = null;
      for (var j = 0; j < arch.employees.length; j++) {
        if (arch.employees[j].id === parts[1]) { empData = arch.employees[j]; break; }
      }
      if (empData) selected.push(empData);
    }
  }

  if (selected.length === 0) { alert('请选择要恢复的员工'); return; }
  if (!confirm('确认恢复选中的 ' + selected.length + ' 位员工历史数据到本月？')) return;

  selected.forEach(function(se) {
    var curEmp = null;
    for (var i = 0; i < employeeList.length; i++) {
      if (employeeList[i].id === se.id) { curEmp = employeeList[i]; break; }
    }

    if (!curEmp) {
      curEmp = { id: se.id, name: se.name, wageGroups: [] };
      employeeList.push(curEmp);
    }

    se.groups.forEach(function(sg) {
      var found = false;
      for (var k = 0; k < curEmp.wageGroups.length; k++) {
        if (curEmp.wageGroups[k].price === sg.price) {
          curEmp.wageGroups[k].quantities = curEmp.wageGroups[k].quantities.concat(sg.quantities);
          found = true; break;
        }
      }
      if (!found) {
        var restored = { id: genId(), price: sg.price, quantities: sg.quantities.slice() };
        curEmp.wageGroups.push(restored);
      }
    });

    for (var i = 0; i < arch.employees.length; i++) {
      if (arch.employees[i].id === se.id) { arch.employees.splice(i, 1); break; }
    }
  });

  archives = archives.filter(function(a) { return a.employees.length > 0; });
  saveData();
  saveArchives();
  showToast('已恢复 ' + selected.length + ' 位员工数据');
  renderHistory();
}

/* ======================== History: Clear ======================== */
function clearArchive(arch, archIdx) {
  var chks = document.querySelectorAll('.hist-emp-chk:checked');
  var selectedIds = [];
  for (var i = 0; i < chks.length; i++) {
    var parts = chks[i].value.split('|');
    if (parts[0] === arch.id) selectedIds.push(parts[1]);
  }

  if (selectedIds.length === 0) {
    if (!confirm('未选择员工，确认清除整个 ' + arch.month + ' 月记录？')) return;
    archives.splice(archIdx, 1);
    saveArchives();
    renderHistory();
    showToast('已清除 ' + arch.month + ' 月记录');
    return;
  }

  if (!confirm('确认清除选中的 ' + selectedIds.length + ' 位员工记录？')) return;

  arch.employees = arch.employees.filter(function(e) { return selectedIds.indexOf(e.id) === -1; });
  if (arch.employees.length === 0) {
    archives.splice(archIdx, 1);
  }
  saveArchives();
  renderHistory();
  showToast('已清除选中记录');
}

function exportArchiveSelected(arch) {
  var chks = document.querySelectorAll('.hist-emp-chk:checked');
  var selected = [];
  for (var i = 0; i < chks.length; i++) {
    var parts = chks[i].value.split('|');
    if (parts[0] === arch.id) {
      for (var j = 0; j < arch.employees.length; j++) {
        if (arch.employees[j].id === parts[1]) {
          selected.push(arch.employees[j]); break;

  page.appendChild(title);

  emps.forEach(function(emp) {

      hint.style.cssText = 'color:#aaa;padding:8px 0;font-size:.88rem;';
      hint.textContent = '暂无数据';
      sec.appendChild(hint);
    } else {

        row.innerHTML = '<div class="col">' + g.price + '</div><div class="col" style="text-align:center;">' + qStr + '</div><div class="col">￥' + fmt(sub) + '</div>';

      });
    }

    var empTotalDiv = ce('div', 'export-total');
    empTotalDiv.textContent = emp.name + ' 总工资：￥' + fmt(empTotal);
    sec.appendChild(empTotalDiv);
    page.appendChild(sec);
    grandTotal += empTotal;
  });

    var gtDiv = ce('div', 'export-grand-total');
    gtDiv.textContent = '全体员工总工资：￥' + fmt(grandTotal);
    page.appendChild(gtDiv);
  }

/* ---------- Excel Export ---------- */
function buildExportAoa(emps) {
  var headers = ['导出时间', '员工姓名', '单价', '数量', '小计'];
  var rows = [];
  var exportTime = nowStr();
  var allTotal = 0;

  emps.forEach(function(emp) {
    var groups = emp.wageGroups || [];
    if (groups.length === 0) {
      rows.push([exportTime, emp.name, '', '', 0]);
      rows.push([exportTime, emp.name + ' 小计', '', '', 0]);
      rows.push([]);
      return;
    }
    var empTotal = 0;
    groups.forEach(function(g) {
      var qStr = g.quantities.join(' + ');
      var sub = calcGroupTotal(g);
      empTotal += sub;
      rows.push([exportTime, emp.name, g.price, qStr, sub]);
    });
    rows.push([exportTime, emp.name + ' 小计', '', '', Math.round(empTotal * 100) / 100]);
    rows.push([]);
    allTotal += empTotal;
  });

  rows.push(['', '全体员工总工资', '', '', Math.round(allTotal * 100) / 100]);
  return { aoa: [headers].concat(rows), headerRows: [0], totalRow: rows.length - 1 };
}

function buildExportFromArchiveAoa(emps) {
  var headers = ['月份', '员工姓名', '单价', '数量', '小计'];
  var rows = [];
  var allTotal = 0;

  emps.forEach(function(emp) {
    var groups = emp.groups || [];
    if (groups.length === 0) return;
    var empTotal = 0;
    groups.forEach(function(g) {
      var qStr = g.quantities.join(' + ');
      var sub = calcGroupTotal(g);
      empTotal += sub;
      rows.push([emp.month || '', emp.name, g.price, qStr, sub]);
    });
    rows.push(['', emp.name + ' 小计', '', '', Math.round(empTotal * 100) / 100]);
    rows.push([]);
    allTotal += empTotal;
  });

  rows.push(['', '总合计', '', '', Math.round(allTotal * 100) / 100]);
  return { aoa: [headers].concat(rows), headerRows: [0] };
}

function downloadExcel(spec, filename) {
  if (typeof XLSX === 'undefined') { alert('Excel 组件未加载，请刷新重试。'); return; }
  var ws = XLSX.utils.aoa_to_sheet(spec.aoa);
  ws['!cols'] = [{ wch: 18 }, { wch: 12 }, { wch: 10 }, { wch: 16 }, { wch: 12 }];
  ws['!views'] = [{ state: 'frozen', ySplit: 1 }];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '工资');
  XLSX.writeFile(wb, filename, { compression: true });
}

function exportExcel(emps, filename) {
  if (emps.length === 0) return;
  var spec = buildExportAoa(emps);
  downloadExcel(spec, filename);
}

function exportExcelFromArchive(emps, filename) {
  if (emps.length === 0) return;
  var spec = buildExportFromArchiveAoa(emps.map(function(e) { return { month: '', name: e.name, groups: e.groups }; }));
  downloadExcel(spec, filename);
}

function exportExcelAllArchive(all, filename) {
  if (all.length === 0) return;
  var spec = buildExportFromArchiveAoa(all);
  downloadExcel(spec, filename);
}
